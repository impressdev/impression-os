name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Quality harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the harness (schema, references, a11y, determinism, guardrails, regression)
        run: node --test
